<div class="container">
  <div class="card">
    <h2>New Subscription</h2>
    <form [formGroup]="subscriptionForm" (ngSubmit)="onSubmit()" class="member-form">
      <div class="form-grid">
        <div class="form-group">
          <label for="memberId">Select Member</label>
          <select id="memberId" formControlName="memberId">
            <option value="" disabled>Choose a member</option>
            <option *ngFor="let member of members()" [value]="member.id">
              {{ member.name }} ({{ member.phone }})
            </option>
          </select>
        </div>

        <div class="form-group">
          <label for="planId">Select Plan</label>
          <select id="planId" formControlName="planId">
            <option value="" disabled>Choose a plan</option>
            <option *ngFor="let plan of plans()" [value]="plan.id">
              {{ plan.name }} - ₹{{ plan.price }} ({{ plan.duration }} days)
            </option>
          </select>
        </div>

        <div class="form-group">
          <label for="startDate">Start Date</label>
          <input id="startDate" type="date" formControlName="startDate">
        </div>
      </div>

      <div class="form-actions">
        <app-button 
          label="Save Subscription" 
          type="submit" 
          [disabled]="subscriptionForm.invalid || loading()"
          variant="primary"
        ></app-button>
      </div>
    </form>
  </div>
</div>
