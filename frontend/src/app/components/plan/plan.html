<div class="container full-width">
  <div class="table-header-section">
    <div class="header-left">
      <div class="title-with-back">
        <button class="btn-back-modern" (click)="goBack()" title="Go Back">
          <span class="back-icon">
            <svg viewBox="0 0 24 24">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
          </span>
        </button>
        <div class="header-info">
          <h1 class="section-title">Plans</h1>
        </div>
      </div>
    </div>
    <div class="header-right">
      <app-button 
        label="Refresh" 
        variant="secondary" 
        (onClick)="loadPlans()"
        class="mr-12"
      ></app-button>
      <app-button 
        label="Add Plan" 
        variant="primary" 
        (onClick)="openAddModal()"
      ></app-button>
    </div>
  </div>

  <div class="table-container-card">
    <app-stag-table 
      [columns]="columns" 
      [data]="plans()"
      [showActions]="true"
      (edit)="onEdit($event)"
      (delete)="onDelete($event)"
      [loading]="loading()"
      [emptyMessage]="loading() ? 'Loading plans...' : 'No plans configured.'"
    ></app-stag-table>
  </div>

  <app-modal 
    [isOpen]="showModal()" 
    [title]="isEditing() ? 'Edit Gym Plan' : 'Define New Gym Plan'"
    (close)="closeModal()"
  >
    <form [formGroup]="planForm" (ngSubmit)="onSubmit()" class="member-form">
      <div class="form-grid-modern">
        <div class="form-group-modern">
          <label for="name">Plan Name</label>
          <input id="name" type="text" formControlName="name" placeholder="e.g. Monthly Gold">
        </div>

        <div class="form-group-modern">
          <label for="duration">Duration (Days)</label>
          <input id="duration" type="number" formControlName="duration" placeholder="e.g. 30">
        </div>

        <div class="form-group-modern">
          <label for="price">Price (₹)</label>
          <input id="price" type="number" formControlName="price" placeholder="e.g. 1500">
        </div>
      </div>

      <div class="form-actions-modern">
        <app-button 
          label="Cancel" 
          variant="secondary" 
          (onClick)="closeModal()"
        ></app-button>
        <app-button 
          [label]="isEditing() ? 'Update Plan' : 'Save Plan'" 
          type="submit" 
          [disabled]="planForm.invalid"
          variant="primary"
        ></app-button>
      </div>
    </form>
  </app-modal>
</div>
