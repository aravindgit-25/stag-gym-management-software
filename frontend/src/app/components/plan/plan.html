<div class="container">
  <div class="table-header-section">
    <div class="header-left">
      <h1>Active Plans</h1>
      <p class="subtitle">Manage gym membership plans and durations</p>
    </div>
    <div class="header-right">
      <app-button 
        label="Refresh" 
        variant="secondary" 
        (onClick)="loadPlans()"
        class="mr-10"
      ></app-button>
      <app-button 
        label="Add Plan" 
        variant="primary" 
        (onClick)="openAddModal()"
      ></app-button>
    </div>
  </div>

  <app-stag-table 
    [columns]="columns" 
    [data]="plans()"
    [showActions]="true"
    (edit)="onEdit($event)"
    (delete)="onDelete($event)"
    [loading]="loading()"
    [emptyMessage]="loading() ? 'Loading plans...' : 'No plans configured.'"
  ></app-stag-table>

  <app-modal 
    [isOpen]="showModal()" 
    [title]="isEditing() ? 'Edit Gym Plan' : 'Define New Gym Plan'"
    (close)="closeModal()"
  >
    <form [formGroup]="planForm" (ngSubmit)="onSubmit()" class="member-form">
      <div class="form-grid">
        <div class="form-group">
          <label for="name">Plan Name</label>
          <input id="name" type="text" formControlName="name" placeholder="e.g. Monthly Gold">
        </div>

        <div class="form-group">
          <label for="duration">Duration (Days)</label>
          <input id="duration" type="number" formControlName="duration" placeholder="e.g. 30">
        </div>

        <div class="form-group">
          <label for="price">Price (₹)</label>
          <input id="price" type="number" formControlName="price" placeholder="e.g. 1500">
        </div>
      </div>

      <div class="form-actions mt-20">
        <app-button 
          label="Cancel" 
          variant="secondary" 
          (onClick)="closeModal()"
          class="mr-10"
        ></app-button>
        <app-button 
          [label]="isEditing() ? 'Update Plan' : 'Save Plan'" 
          type="submit" 
          [disabled]="planForm.invalid"
          variant="primary"
        ></app-button>
      </div>
    </form>
  </app-modal>
</div>
