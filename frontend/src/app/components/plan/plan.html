<div class="container">
  <div class="card">
    <h2>{{ isEditing() ? 'Edit Gym Plan' : 'Define New Gym Plan' }}</h2>
    <form [formGroup]="planForm" (ngSubmit)="onSubmit()" class="member-form">
      <div class="form-grid">
        <div class="form-group">
          <label for="name">Plan Name</label>
          <input id="name" type="text" formControlName="name" placeholder="e.g. Monthly Gold">
        </div>

        <div class="form-group">
          <label for="duration">Duration (Days)</label>
          <input id="duration" type="number" formControlName="duration" placeholder="e.g. 30">
        </div>

        <div class="form-group">
          <label for="price">Price (₹)</label>
          <input id="price" type="number" formControlName="price" placeholder="e.g. 1500">
        </div>
      </div>

      <div class="form-actions">
        <app-button 
          *ngIf="isEditing()"
          label="Cancel" 
          variant="secondary" 
          (onClick)="cancelEdit()"
          class="mr-10"
        ></app-button>
        <app-button 
          [label]="isEditing() ? 'Update Plan' : 'Save Plan'" 
          type="submit" 
          [disabled]="planForm.invalid"
          variant="primary"
        ></app-button>
      </div>
    </form>
  </div>

  <div class="card mt-20">
    <div class="header-with-actions">
      <h2>Active Plans</h2>
      <app-button label="Refresh" variant="secondary" (onClick)="loadPlans()"></app-button>
    </div>
    
    <app-table 
      [columns]="columns" 
      [data]="plans()"
      [showActions]="true"
      (edit)="onEdit($event)"
      (delete)="onDelete($event)"
      [emptyMessage]="loading() ? 'Loading plans...' : 'No plans configured.'"
    ></app-table>
  </div>
</div>
