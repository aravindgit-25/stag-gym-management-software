<div class="container full-width">
  <div class="table-header-section">
    <div class="header-left">
      <div class="title-with-back">
        <button class="btn-back-modern" (click)="goBack()" title="Go Back">
          <span class="back-icon">
            <svg viewBox="0 0 24 24">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
          </span>
        </button>
        <div class="header-info">
          <h1 class="section-title">Payments</h1>
        </div>
      </div>
    </div>
    <div class="header-right">
      <div class="search-container mr-12">
        <div class="search-box">
          <span class="search-icon">
            <svg viewBox="0 0 24 24" class="svg-icon">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </span>
          <input 
            type="text" 
            [ngModel]="searchTerm()" 
            (ngModelChange)="searchTerm.set($event)" 
            placeholder="Search payments..."
            class="search-input"
          >
        </div>
      </div>
      <app-button label="Refresh" variant="secondary" (onClick)="loadPayments()"></app-button>
    </div>
  </div>
  
  <div class="table-container-card">
    <app-stag-table 
      [columns]="columns" 
      [data]="filteredPayments()"
      [showPrint]="true"
      (print)="onPrintReceipt($event)"
      [loading]="loading()"
      [emptyMessage]="loading() ? 'Loading payments...' : 'No payments found.'"
    ></app-stag-table>
  </div>
</div>
