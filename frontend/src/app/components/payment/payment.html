<div class="container">
  <div class="table-header-section">
    <div class="header-left">
      <div class="title-with-back">
        <button class="btn-back" (click)="goBack()" title="Go Back">
          <span class="back-icon">←</span>
        </button>
        <div>
          <h1>Payments</h1>
          <p class="subtitle">History of all transactions and receipts</p>
        </div>
      </div>
    </div>
    <div class="header-right">
      <app-button label="Refresh" variant="secondary" (onClick)="loadPayments()"></app-button>
    </div>
  </div>
  
  <app-stag-table 
    [columns]="columns" 
    [data]="displayList()"
    [showPrint]="true"
    (print)="onPrintReceipt($event)"
    [loading]="loading()"
    [emptyMessage]="loading() ? 'Loading payments...' : 'No payments found.'"
  ></app-stag-table>
</div>
