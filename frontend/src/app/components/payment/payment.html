<div class="container">
  <div class="card">
    <h2>Record Payment</h2>
    <form [formGroup]="paymentForm" (ngSubmit)="onSubmit()" class="member-form">
      <div class="form-grid">
        <div class="form-group">
          <label for="subscriptionId">Select Subscription</label>
          <select id="subscriptionId" formControlName="subscriptionId">
            <option value="" disabled>Choose a subscription</option>
            <option *ngFor="let sub of subscriptions()" [value]="sub.id">
              ID: {{ sub.id }} - Member: {{ sub.memberId }} (Plan: {{ sub.planId }})
            </option>
          </select>
        </div>

        <div class="form-group">
          <label for="amount">Amount (₹)</label>
          <input id="amount" type="number" formControlName="amount" placeholder="e.g. 1500">
        </div>

        <div class="form-group">
          <label for="paymentMode">Payment Mode</label>
          <select id="paymentMode" formControlName="paymentMode">
            <option *ngFor="let mode of paymentModes" [value]="mode">{{ mode }}</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <app-button 
          label="Record Payment" 
          type="submit" 
          [disabled]="paymentForm.invalid || loading()"
          variant="primary"
        ></app-button>
      </div>
    </form>
  </div>
</div>
