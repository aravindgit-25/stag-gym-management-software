<div class="container">
  <div class="card">
    <div class="header-with-actions">
      <h2>Payment History</h2>
      <app-button label="Refresh" variant="secondary" (onClick)="loadPayments()"></app-button>
    </div>
    
    <app-stag-table 
      [columns]="columns" 
      [data]="displayList()"
      [showPrint]="true"
      (print)="onPrintReceipt($event)"
      [loading]="loading()"
      [emptyMessage]="loading() ? 'Loading payments...' : 'No payments found.'"
    ></app-stag-table>
  </div>
</div>
