<div class="container full-width">
  <div class="table-header-section">
    <div class="header-left">
      <div class="title-with-back">
        <button class="btn-back-modern" (click)="goBack()" title="Go Back">
          <span class="back-icon">
            <svg viewBox="0 0 24 24">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
          </span>
        </button>
        <div class="header-info">
          <h1 class="section-title">Daily Attendance</h1>
        </div>
      </div>
    </div>
    <div class="header-right">
      <div class="date-picker-container mr-12">
        <input type="date" [ngModel]="selectedDate()" (ngModelChange)="selectedDate.set($event); loadAttendance()" class="date-input">
      </div>
      <app-button 
        label="Refresh" 
        variant="secondary" 
        (onClick)="loadAttendance()"
      ></app-button>
    </div>
  </div>

  <div class="attendance-layout">
    <div class="attendance-main">
      <div class="table-container-card">
        <div class="card-header-simple">Who's In Today</div>
        <app-stag-table 
          [columns]="tableColumns" 
          [data]="attendanceData()"
          [height]="'calc(100vh - 280px)'"
          [loading]="loading()"
          [emptyMessage]="'No attendance marked for this date.'"
        >
          <ng-template #cell let-row let-col="column">
            <div *ngIf="col.field === 'actions'">
              <button class="btn-history-mini" (click)="openHistoryModal(row)" title="View History">
                <svg viewBox="0 0 24 24" width="16" height="16">
                  <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2" fill="none"></path>
                </svg>
              </button>
            </div>
          </ng-template>
        </app-stag-table>
      </div>
    </div>

    <div class="attendance-sidebar">
      <div class="sidebar-card">
        <div class="card-header-simple">Pending Mark</div>
        <div class="pending-list">
          <div *ngIf="missingAttendance().length === 0" class="empty-pending">All staff accounted for!</div>
          <div *ngFor="let emp of missingAttendance()" class="pending-item">
            <div class="emp-info">
              <span class="emp-name">{{ emp.name }}</span>
              <span class="emp-role">{{ emp.role }}</span>
            </div>
            <button class="btn-mark-mini" (click)="openMarkModal(emp)">Mark</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Mark Attendance Modal -->
  <app-modal 
    [isOpen]="showMarkModal()" 
    [title]="'Mark Attendance: ' + selectedEmployee()?.name"
    (close)="showMarkModal.set(false)"
  >
    <form [formGroup]="markForm" (ngSubmit)="onMark()" class="mark-form">
      <div class="form-group-modern">
        <label>Status</label>
        <select formControlName="status">
          <option *ngFor="let s of attendanceStatuses" [value]="s">{{ s }}</option>
        </select>
      </div>
      <div class="form-group-modern mt-16">
        <label>Notes</label>
        <textarea formControlName="notes" rows="3" placeholder="Any comments..."></textarea>
      </div>
      <div class="form-actions-modern mt-24">
        <app-button label="Cancel" variant="secondary" (onClick)="showMarkModal.set(false)"></app-button>
        <app-button label="Submit" type="submit" variant="primary"></app-button>
      </div>
    </form>
  </app-modal>

  <!-- Employee History Modal -->
  <app-modal 
    [isOpen]="showHistoryModal()" 
    [title]="'Monthly History: ' + selectedHistoryEmployee()?.name"
    (close)="showHistoryModal.set(false)"
  >
    <div class="history-container">
      <div class="history-filters mb-20">
        <div class="filter-controls">
          <select [ngModel]="historyMonth()" (ngModelChange)="historyMonth.set($event); loadHistory()" class="filter-select">
            <option [value]="1">January</option><option [value]="2">February</option>
            <option [value]="3">March</option><option [value]="4">April</option>
            <option [value]="5">May</option><option [value]="6">June</option>
            <option [value]="7">July</option><option [value]="8">August</option>
            <option [value]="9">September</option><option [value]="10">October</option>
            <option [value]="11">November</option><option [value]="12">December</option>
          </select>
          <select [ngModel]="historyYear()" (ngModelChange)="historyYear.set($event); loadHistory()" class="filter-select ml-10">
            <option [value]="2025">2025</option>
            <option [value]="2026">2026</option>
          </select>
        </div>
      </div>

      <div class="history-summary-grid">
        <div class="summary-item present">
          <span class="count">{{ historySummary().present }}</span>
          <span class="label">Present</span>
        </div>
        <div class="summary-item absent">
          <span class="count">{{ historySummary().absent }}</span>
          <span class="label">Absent</span>
        </div>
        <div class="summary-item late">
          <span class="count">{{ historySummary().late }}</span>
          <span class="label">Late</span>
        </div>
        <div class="summary-item other">
          <span class="count">{{ historySummary().halfDay }}</span>
          <span class="label">Half Day</span>
        </div>
      </div>

      <div class="history-table-wrapper mt-20">
        <app-stag-table 
          [columns]="historyColumns" 
          [data]="historyRecords()"
          [height]="'350px'"
          [loading]="historyLoading()"
          [emptyMessage]="'No history found for this month.'"
        ></app-stag-table>
      </div>
    </div>
  </app-modal>
</div>
