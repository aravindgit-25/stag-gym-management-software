<div class="container">
  <div class="card">
    <h2>Add New Member</h2>
    <form [formGroup]="memberForm" (ngSubmit)="onSubmit()" class="member-form">
      <div class="form-grid">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input id="name" type="text" formControlName="name" placeholder="Enter name">
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input id="phone" type="text" formControlName="phone" placeholder="10-digit number">
        </div>

        <div class="form-group">
          <label for="gender">Gender</label>
          <select id="gender" formControlName="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="branch_id">Branch ID</label>
          <input id="branch_id" type="number" formControlName="branch_id">
        </div>
      </div>

      <div class="form-actions">
        <!-- For submit buttons, we don't need (onClick) as the form handles (ngSubmit) -->
        <app-button 
          label="Add Member" 
          type="submit" 
          [disabled]="memberForm.invalid"
          variant="primary"
        ></app-button>
      </div>
    </form>
  </div>

  <div class="card mt-20">
    <div class="header-with-actions">
      <h2>Member List</h2>
      <app-button 
        label="Refresh" 
        variant="secondary" 
        (onClick)="loadMembers()"
      ></app-button>
    </div>
    
    <app-table 
      [columns]="columns" 
      [data]="members()"
      [emptyMessage]="loading() ? 'Loading members...' : 'No members found.'"
    ></app-table>
  </div>
</div>
