<div class="container">
  <div class="card">
    <h2>{{ isEditing() ? 'Edit Member' : 'Add New Member' }}</h2>
    <form [formGroup]="memberForm" (ngSubmit)="onSubmit()" class="member-form">
      <div class="form-grid">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input id="name" type="text" formControlName="name" placeholder="Enter name">
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input id="phone" type="text" formControlName="phone" placeholder="10-digit number">
        </div>

        <div class="form-group">
          <label for="gender">Gender</label>
          <select id="gender" formControlName="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="branchId">Branch ID</label>
          <input id="branchId" type="number" formControlName="branchId">
        </div>
      </div>

      <div class="form-actions">
        <app-button 
          *ngIf="isEditing()"
          label="Cancel" 
          variant="secondary" 
          (onClick)="cancelEdit()"
          class="mr-10"
        ></app-button>
        <app-button 
          [label]="isEditing() ? 'Update Member' : 'Add Member'" 
          type="submit" 
          [disabled]="memberForm.invalid"
          variant="primary"
        ></app-button>
      </div>
    </form>
  </div>

  <div class="card mt-20">
    <div class="header-with-actions">
      <h2>Member List</h2>
      <app-button 
        label="Refresh" 
        variant="secondary" 
        (onClick)="loadMembers()"
      ></app-button>
    </div>
    
    <app-table 
      [columns]="columns" 
      [data]="members()"
      [showActions]="true"
      (edit)="onEdit($event)"
      (delete)="onDelete($event)"
      [emptyMessage]="loading() ? 'Loading members...' : 'No members found.'"
    ></app-table>
  </div>
</div>
