<div class="container full-width">
  <div class="table-header-section">
    <div class="header-left">
      <h1>Members</h1>
      <p class="subtitle">Manage your gym members and their subscriptions</p>
    </div>
    <div class="header-right">
      <app-button 
        label="Refresh" 
        variant="secondary" 
        (onClick)="loadMembers()"
        class="mr-10"
      ></app-button>
      <app-button 
        label="Add Member" 
        variant="primary" 
        (onClick)="openAddModal()"
      ></app-button>
    </div>
  </div>

  <div class="table-container-card">
    <app-stag-table 
      [columns]="tableColumns()" 
      [data]="filteredMembers()"
      [height]="tableHeight()"
      [showActions]="true"
      [showRenew]="true"
      [loading]="loading()"
      [emptyMessage]="loading() ? 'Loading members...' : 'No members found.'"
      [showSelectionColumn]="true"
      [enableBulkActions]="false"
      [storageKey]="'member-table-columns'"
      [editingRowIndex]="editingRowIndex()"
      (edit)="onEdit($event)"
      (delete)="onDelete($event)"
      (renew)="onRenew($event)"
      (selectionChange)="onTableSelectionChange($event)"
      (rowClick)="onRowClick($event)"
      (globalSearchChange)="onMemberGlobalSearch($event)"
    ></app-stag-table>
  </div>

  <!-- Add/Edit Member Modal -->
  <app-modal 
    [isOpen]="showModal()" 
    [title]="isEditing() ? 'Edit Member' : 'Add New Member'"
    (close)="closeModal()"
  >
    <form [formGroup]="memberForm" (ngSubmit)="onSubmit()" class="member-form">
      <div class="form-grid">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input id="name" type="text" formControlName="name" placeholder="Enter full name">
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input id="phone" type="text" formControlName="phone" placeholder="10-digit mobile number">
        </div>

        <div class="form-group">
          <label for="gender">Gender</label>
          <select id="gender" formControlName="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="branchId">Branch ID</label>
          <input id="branchId" type="number" formControlName="branchId">
        </div>
      </div>

      <div class="form-actions">
        <app-button 
          label="Cancel" 
          variant="secondary" 
          (onClick)="closeModal()"
          class="mr-10"
        ></app-button>
        <app-button 
          [label]="isEditing() ? 'Update Member' : 'Save Member'" 
          type="submit" 
          [disabled]="memberForm.invalid"
          variant="primary"
        ></app-button>
      </div>
    </form>
  </app-modal>
</div>
