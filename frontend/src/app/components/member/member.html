<div class="container full-width">
  <div class="table-header-section">
    <div class="header-left">
      <div class="title-with-back">
        <button class="btn-back-modern" (click)="goBack()" title="Go Back">
          <span class="back-icon">
            <svg viewBox="0 0 24 24">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
          </span>
        </button>
        <div class="header-info">
          <h1 class="section-title">Members</h1>
        </div>
      </div>
    </div>
    <div class="header-right">
      <div class="search-container mr-12">
        <div class="search-box">
          <span class="search-icon">
            <svg viewBox="0 0 24 24" class="svg-icon">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </span>
          <input 
            type="text" 
            [ngModel]="searchTerm()" 
            (ngModelChange)="searchTerm.set($event)" 
            placeholder="Search members..."
            class="search-input"
          >
        </div>
      </div>
      <app-button 
        label="Refresh" 
        variant="secondary" 
        (onClick)="loadMembers()"
        class="mr-12"
      ></app-button>
      <app-button 
        label="Add Member" 
        variant="primary" 
        (onClick)="openAddModal()"
      ></app-button>
    </div>
  </div>

  <div class="table-container-card">
    <app-stag-table 
      [columns]="tableColumns()" 
      [data]="filteredMembers()"
      [height]="tableHeight()"
      [showActions]="true"
      [showRenew]="true"
      [showView]="true"
      [loading]="loading()"
      [emptyMessage]="loading() ? 'Loading members...' : 'No members found.'"
      [showSelectionColumn]="true"
      [enableBulkActions]="false"
      [filterTerm]="searchTerm()"
      [storageKey]="'member-table-columns'"
      [editingRowIndex]="editingRowIndex()"
      (edit)="onEdit($event)"
      (renew)="onRenew($event)"
      (delete)="onDelete($event)"
      (view)="onViewInvoice($event)"
      (selectionChange)="onTableSelectionChange($event)"
      (rowClick)="onRowClick($event)"
    ></app-stag-table>
  </div>

  <!-- Unified Onboarding Modal -->
  <app-modal 
    [isOpen]="showModal()" 
    [title]="isEditing() ? 'Edit Member' : (currentStep() === 1 ? 'Step 1: Member Registration' : (currentStep() === 2 ? 'Step 2: Select Plan' : 'Step 3: Payment Details'))"
    (close)="closeModal()"
  >
    <!-- Step Indicator -->
    <div class="step-indicator-modern" *ngIf="!isEditing()">
      <div class="step-node" [class.active]="currentStep() >= 1" [class.completed]="currentStep() > 1">
        <span class="step-number">1</span>
        <span class="step-label">Register</span>
      </div>
      <div class="step-connector" [class.active]="currentStep() > 1"></div>
      <div class="step-node" [class.active]="currentStep() >= 2" [class.completed]="currentStep() > 2">
        <span class="step-number">2</span>
        <span class="step-label">Plan</span>
      </div>
      <div class="step-connector" [class.active]="currentStep() > 2"></div>
      <div class="step-node" [class.active]="currentStep() >= 3">
        <span class="step-number">3</span>
        <span class="step-label">Payment</span>
      </div>
    </div>

    <!-- STEP 1: Member Form -->
    <form *ngIf="currentStep() === 1" [formGroup]="memberForm" (ngSubmit)="onSubmitMember()" class="member-form">
      <div class="form-grid-modern">
        <div class="form-group-modern">
          <label>Registration ID</label>
          <input type="text" formControlName="registrationId" readonly class="readonly-input-modern">
        </div>

        <div class="form-group-modern">
          <label>Full Name</label>
          <input type="text" formControlName="name" placeholder="Enter full name">
        </div>

        <div class="form-group-modern">
          <label>Phone Number</label>
          <input type="text" formControlName="phone" placeholder="10-digit mobile number">
        </div>

        <div class="form-group-modern">
          <label>Gender</label>
          <select formControlName="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group-modern">
          <label>Branch ID</label>
          <input type="number" formControlName="branchId">
        </div>
      </div>

      <div class="form-actions-modern">
        <app-button label="Cancel" variant="secondary" (onClick)="closeModal()"></app-button>
        <app-button 
          [label]="isEditing() ? 'Update Details' : 'Save & Continue'" 
          type="submit" 
          [disabled]="memberForm.invalid"
          variant="primary"
        ></app-button>
      </div>
    </form>

    <!-- STEP 2: Plan Selection -->
    <form *ngIf="currentStep() === 2" [formGroup]="subscriptionForm" (ngSubmit)="onSubmitSubscription()" class="member-form">
      <div class="form-grid-modern single-col">
        <div class="form-group-modern">
          <label>Select Membership Plans</label>
          <app-stag-dropdown 
            [items]="planDropdownItems()"
            placeholder="Select one or more plans..."
            [selectedIds]="selectedPlanIds"
            (selectionChange)="selectedPlanIds.set($event); togglePlan({id: 0, name: '', price: 0, duration: 0})" 
          ></app-stag-dropdown>
          <div class="selection-summary-modern" *ngIf="selectedPlanIds().length > 0">
            <span>{{ selectedPlanIds().length }} Plan(s) Selected</span>
            <span class="price-pill">Total: ₹{{ paymentForm.get('amount')?.value }}</span>
          </div>
        </div>

        <div class="form-group-modern">
          <label>Start Date</label>
          <input type="date" formControlName="startDate">
        </div>
      </div>

      <div class="form-actions-modern">
        <app-button label="Cancel" variant="secondary" (onClick)="closeModal()"></app-button>
        <app-button 
          [label]="'Confirm & Proceed to Payment'" 
          type="submit" 
          [disabled]="selectedPlanIds().length === 0 || !!subscriptionForm.get('startDate')?.invalid"
          variant="primary"
        ></app-button>
      </div>
    </form>

    <!-- STEP 3: Payment Details -->
    <form *ngIf="currentStep() === 3" [formGroup]="paymentForm" (ngSubmit)="onSubmitPayment()" class="member-form">
      <div class="form-grid-modern">
        <div class="form-group-modern">
          <label>Total Plan Amount (₹)</label>
          <input type="number" formControlName="amount" readonly class="readonly-input-modern">
        </div>

        <div class="form-group-modern">
          <label>Amount Paid Now (₹)</label>
          <input type="number" formControlName="paidAmount" placeholder="Enter amount paid">
        </div>

        <div class="form-group-modern">
          <label>Balance Amount (₹)</label>
          <input type="number" [value]="paymentForm.get('balanceAmount')?.value" readonly class="readonly-input-modern">
        </div>

        <div class="form-group-modern">
          <label>Balance Due Date</label>
          <input type="date" formControlName="balanceDueDate" [attr.disabled]="paymentForm.get('balanceAmount')?.value <= 0 ? true : null">
        </div>

        <div class="form-group-modern">
          <label>Payment Mode</label>
          <select formControlName="paymentMode">
            <option *ngFor="let mode of paymentModes" [value]="mode">{{ mode }}</option>
          </select>
        </div>
      </div>

      <div class="form-actions-modern">
        <app-button label="Cancel" variant="secondary" (onClick)="closeModal()"></app-button>
        <app-button 
          [label]="'Finalize & Generate Invoice'" 
          type="submit" 
          [disabled]="paymentForm.invalid"
          variant="primary"
        ></app-button>
      </div>
    </form>
  </app-modal>
</div>
